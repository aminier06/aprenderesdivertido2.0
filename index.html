<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Campamento Aprender es Divertido</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {margin:0;font-family:Arial;background:#f2f6fb;}
header {background:#0f4c81;color:white;padding:20px;text-align:center;}
.contenedor {max-width:900px;margin:40px auto;padding:20px;}

.tarjeta {
background:white;
border-radius:14px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:25px;
}

.modulo {
background:#e8f1fb;
border-left:6px solid #0f4c81;
padding:20px;
border-radius:12px;
cursor:pointer;
}

.modulo:hover {background:#dbeafe;}

.oculto {display:none;}

input, select {
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button {
margin-top:15px;
background:#0f4c81;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.mensaje {margin-top:10px;font-weight:bold;}
.error {color:red;}
.ok {color:green;}

.estudiante {
background:#f8fafc;
border:1px solid #dbe3ef;
border-radius:10px;
padding:12px;
margin-top:10px;
}

.opciones label {margin-right:10px;}
</style>
</head>

<body>

<header>
<h1>Campamento Aprender es Divertido</h1>
</header>

<div class="contenedor">

<!-- LOGIN -->
<section id="login" class="tarjeta">
<h2>Inicio de sesión</h2>

<input id="cedula" placeholder="Cédula">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="iniciarSesion()">Entrar</button>

<div id="msgLogin" class="mensaje"></div>
</section>

<!-- PANEL -->
<section id="panel" class="tarjeta oculto">
<h2>Panel principal</h2>

<div id="infoUsuario"></div>

<div class="grid">
<div class="modulo" onclick="abrirAsistencia()">Pase de lista</div>
<div class="modulo">Acompañamientos</div>
<div class="modulo">Incidencias</div>
<div class="modulo">Evaluaciones</div>
<div class="modulo">Reportes</div>
</div>

<button onclick="cerrar()">Cerrar sesión</button>
</section>

<!-- ASISTENCIA -->
<section id="asistencia" class="tarjeta oculto">
<h2>Pase de lista</h2>

<div id="infoUsuarioAsistencia"></div>

<select id="grupo">
<option value="">Seleccione grupo</option>
<option>EXPLORADORES</option>
<option>CREADORES</option>
<option>INNOVADORES</option>
</select>

<button onclick="cargar()">Cargar estudiantes</button>

<div id="msg" class="mensaje"></div>
<div id="lista"></div>

<button onclick="volver()">Volver</button>
</section>

</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxcTc7PtW4v9lXy4ibA8lMBUwJyKwmigoQbIHSYyyFJ70Xwl5S7fAjIpmnqfwCn4tFq/exec";

let usuario = null;

function iniciarSesion(){
let c = document.getElementById("cedula").value.trim();
let p = document.getElementById("password").value.trim();
let msgLogin = document.getElementById("msgLogin");

if(!c || !p){
msgLogin.innerHTML="Debe completar los campos";
msgLogin.className="mensaje error";
return;
}

msgLogin.innerHTML="Validando usuario...";
msgLogin.className="mensaje";

let cb="cb"+Date.now();

window[cb]=function(r){
if(r.ok){
usuario=r.usuario;

document.getElementById("login").classList.add("oculto");
document.getElementById("panel").classList.remove("oculto");

document.getElementById("infoUsuario").innerHTML=`
<b>${usuario.nombre}</b><br>
${usuario.rol}<br>
${usuario.centroSede}
`;

}else{
msgLogin.innerHTML=r.mensaje || "Error en login";
msgLogin.className="mensaje error";
}
};

let s=document.createElement("script");
s.src=`${URL_SCRIPT}?accion=login&cedula=${encodeURIComponent(c)}&password=${encodeURIComponent(p)}&callback=${cb}`;
document.body.appendChild(s);
}

function abrirAsistencia(){
document.getElementById("panel").classList.add("oculto");
document.getElementById("asistencia").classList.remove("oculto");

document.getElementById("infoUsuarioAsistencia").innerHTML=`
<b>${usuario.nombre}</b><br>
${usuario.centroSede}
`;
}

function volver(){
document.getElementById("asistencia").classList.add("oculto");
document.getElementById("panel").classList.remove("oculto");
}

function cargar(){
let g=document.getElementById("grupo").value;
let msg=document.getElementById("msg");
let lista=document.getElementById("lista");

if(!g){
msg.innerHTML="Seleccione un grupo";
msg.className="mensaje error";
return;
}

msg.innerHTML="Cargando...";
msg.className="mensaje";

let cb="cb"+Date.now();

window[cb]=function(r){
lista.innerHTML="";

if(r.ok && r.estudiantes.length>0){
msg.innerHTML="Estudiantes cargados";
msg.className="mensaje ok";

r.estudiantes.forEach(e=>{
lista.innerHTML+=`
<div class="estudiante">
<b>${e.nombre}</b><br>

<label><input type="radio" name="${e.idEstudiante}" value="P" checked>Presente</label>
<label><input type="radio" name="${e.idEstudiante}" value="T">Tardanza</label>
<label><input type="radio" name="${e.idEstudiante}" value="A">Ausente</label>
<label><input type="radio" name="${e.idEstudiante}" value="E">Excusa</label>

</div>`;
});

}else{
msg.innerHTML="No se encontraron estudiantes";
msg.className="mensaje error";
}
};

let s=document.createElement("script");
s.src=`${URL_SCRIPT}?accion=estudiantes&cedula=${usuario.cedula}&grupo=${g}&callback=${cb}`;
document.body.appendChild(s);
}

function cerrar(){
location.reload();
}
</script>

</body>
</html>
